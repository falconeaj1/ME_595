<svg width="620" height="290" viewBox="0 0 620 290" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4B2E83"/>
    </marker>
  </defs>

  <!-- SINDyC surrogate — top center -->
  <rect x="195" y="12" width="210" height="68" rx="8" fill="#4B2E83"/>
  <text x="300" y="40" text-anchor="middle" fill="white" font-weight="bold" font-size="16">SINDyC surrogate</text>
  <text x="300" y="62" text-anchor="middle" fill="#E8D5A3" font-size="12">dynamics + control model</text>

  <!-- RL Controller — bottom right -->
  <rect x="410" y="205" width="190" height="68" rx="8" fill="#FDF8EC" stroke="#8B6914" stroke-width="2.5"/>
  <text x="505" y="234" text-anchor="middle" fill="#8B6914" font-weight="bold" font-size="15">RL controller</text>
  <text x="505" y="256" text-anchor="middle" fill="#8B6914" font-size="12">keeps pendulum up</text>

  <!-- Near-eq data — bottom left -->
  <rect x="20" y="205" width="190" height="68" rx="8" fill="#F0EDF7" stroke="#4B2E83" stroke-width="2"/>
  <text x="115" y="234" text-anchor="middle" fill="#4B2E83" font-weight="bold" font-size="15">Near-eq. data</text>
  <text x="115" y="256" text-anchor="middle" fill="#4B2E83" font-size="12">needed to fit SINDyC</text>

  <!-- Arrow 1: SINDyC → Controller (right side, downward) -->
  <!-- From SINDyC right edge (405, 55) → Controller top (450, 205) -->
  <line x1="400" y1="62" x2="452" y2="202" stroke="#4B2E83" stroke-width="2.5" marker-end="url(#ah)"/>
  <text x="458" y="128" text-anchor="start" fill="#4B2E83" font-size="13">trains</text>

  <!-- Arrow 2: Controller → Near-eq data (bottom, left) -->
  <!-- From Controller left edge (410, 239) → Near-eq right edge (210, 239) -->
  <line x1="408" y1="238" x2="212" y2="238" stroke="#4B2E83" stroke-width="2.5" marker-end="url(#ah)"/>
  <text x="310" y="228" text-anchor="middle" fill="#4B2E83" font-size="13">collects</text>

  <!-- Arrow 3: Near-eq data → SINDyC (left side, upward) -->
  <!-- From Near-eq top (155, 205) → SINDyC bottom-left (220, 80) -->
  <line x1="158" y1="203" x2="222" y2="82" stroke="#4B2E83" stroke-width="2.5" marker-end="url(#ah)"/>
  <text x="155" y="138" text-anchor="end" fill="#4B2E83" font-size="13">fits</text>

  <!-- Center: stuck label -->
  <text x="306" y="170" text-anchor="middle" fill="#cc2222" font-weight="bold" font-size="19">&#x21BA; stuck</text>
</svg>
