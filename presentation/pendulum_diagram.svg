<svg width="220" height="300" viewBox="0 0 220 300" xmlns="http://www.w3.org/2000/svg">
  <!-- rail -->
  <rect x="10" y="255" width="200" height="6" rx="3" fill="#B7A57A"/>
  <!-- cart -->
  <rect x="75" y="233" width="60" height="22" rx="4" fill="#4B2E83"/>
  <!-- wheels -->
  <circle cx="90"  cy="255" r="7" fill="#8B6914" stroke="#fff" stroke-width="1.5"/>
  <circle cx="124" cy="255" r="7" fill="#8B6914" stroke="#fff" stroke-width="1.5"/>
  <!-- pole 1 (inverted, going up from cart top) -->
  <line x1="105" y1="233" x2="120" y2="143" stroke="#4B2E83" stroke-width="4" stroke-linecap="round"/>
  <!-- joint 1 -->
  <circle cx="120" cy="143" r="9" fill="#B7A57A" stroke="#4B2E83" stroke-width="2"/>
  <!-- pole 2 (inverted, going up from joint 1) -->
  <line x1="120" y1="143" x2="130" y2="60" stroke="#4B2E83" stroke-width="4" stroke-linecap="round"/>
  <!-- tip mass -->
  <circle cx="130" cy="60" r="11" fill="#4B2E83"/>
  <!-- angle labels -->
  <text x="83"  y="197" fill="#4B2E83" font-size="15" font-style="italic">&#952;&#8321;</text>
  <text x="106" y="128" fill="#4B2E83" font-size="15" font-style="italic">&#952;&#8322;</text>
  <!-- action arrow -->
  <line x1="20" y1="244" x2="63" y2="244" stroke="#8B6914" stroke-width="2.5"/>
  <polygon points="63,240 72,244 63,248" fill="#8B6914"/>
  <text x="16" y="237" fill="#8B6914" font-size="15" font-style="italic">u</text>
  <!-- L labels -->
  <text x="127" y="193" fill="#888" font-size="12">L&#8321;</text>
  <text x="135" y="108" fill="#888" font-size="12">L&#8322;</text>
</svg>
